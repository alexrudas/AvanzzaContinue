name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.config/dart
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Enforce DOMAIN_CONTRACTS No .wire usage
        run: dart run tool/enforce_domain_contracts.dart

      - name: Analyze (non-fatal legacy infos/warnings)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test --no-pub -j 1
