# ============================================================================
# analysis_options.yaml
# CONFIGURACIÓN DEL ANALYZER — AVANZZA 2.0
#
# PROPÓSITO:
# - Mantener alta calidad de código sin contaminar el análisis con código generado.
# - Priorizar errores reales del código manual (negocio, UI, controladores).
# - Reducir ruido proveniente de build_runner (Freezed, JSON, Isar, etc).
#
# DECISIONES CLAVE:
# - Se excluyen archivos generados (*.g.dart, *.freezed.dart)
# - Se permite @JsonKey en Freezed (regla necesaria para modelos inmutables)
# - Se mantiene base de buenas prácticas con flutter_lints
#
# NOTA:
# - Este archivo NO elimina errores reales del proyecto.
# - Solo elimina ruido irrelevante para permitir análisis útil.
# - Los problemas reales se deben corregir en código manual.
#
# REFERENCIA:
# https://dart.dev/guides/language/analysis-options
# ============================================================================

# Activa el conjunto base de reglas recomendadas por Flutter
include: package:flutter_lints/flutter.yaml

analyzer:
  # --------------------------------------------------------------------------
  # EXCLUSIONES
  # --------------------------------------------------------------------------
  # Se excluyen archivos generados automáticamente para evitar:
  # - Ruido masivo en el análisis
  # - Falsos positivos (ej: experimental_member_use)
  # - Pérdida de foco en problemas reales
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

  # --------------------------------------------------------------------------
  # CONFIGURACIÓN DE ERRORES
  # --------------------------------------------------------------------------
  errors:
    # Permite usar @JsonKey en parámetros de constructor Freezed
    # Sin esto, Freezed rompe el análisis aunque sea correcto
    invalid_annotation_target: ignore

linter:
  # --------------------------------------------------------------------------
  # REGLAS DE LINTER
  # --------------------------------------------------------------------------
  # Se pueden activar/desactivar reglas adicionales según evolución del proyecto
  # Mantener esto mínimo por ahora para no generar ruido innecesario
  rules:
    # Ejemplos opcionales (activar cuando el código esté más limpio):
    # avoid_print: true
    # prefer_single_quotes: true
